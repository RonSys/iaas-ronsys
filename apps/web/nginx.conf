# ═══════════════════════════════════════════════════════════════
#  IaaS-RonSys — NGINX config (Frontend Web)
#
#  Sirve archivos estáticos de dist/ y hace proxy reverso de
#  /api/* al backend. Maneja SPA routing (todas las rutas → index.html).
#
#  Uso:
#    docker build -t iaas-web .
#    docker run -p 80:80 iaas-web
# ═══════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name _;

    # ─── Security headers ─────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ─── Gzip ──────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ─── Root ──────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # ─── API proxy → backend ───────────────────────────────────
    #  En Docker Compose, el servicio backend se llama "backend"
    #  y escucha en el puerto 8000.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;

        # Headers para que el backend sepa quién llama
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # ─── SPA routing → index.html ──────────────────────────────
    #  Todas las rutas que no sean /api/ ni archivos estáticos
    #  devuelven index.html para que React Router maneje el routing.
    location / {
        try_files $uri $uri/ /index.html;

        # Cache para assets con hash (inmutables)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ─── Deny hidden files ─────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
