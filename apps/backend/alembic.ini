# Alembic Configuration

[alembic]
# Path to migration scripts
script_location = app/adapters/alembic

# SQLAlchemy URL (will be overridden by env.py from settings)
sqlalchemy.url = postgresql+asyncpg://ron:ron123@localhost:5432/iaas_ronsys

# Logging
file_template = %%(year)d-%%(month).2d-%%(day).2d_%%(rev)s_%%(slug)s
truncate_slug_length = 40

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
