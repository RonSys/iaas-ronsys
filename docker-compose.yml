# ═══════════════════════════════════════════════════════════════
#  IaaS-RonSys — Infraestructura Base Compartida
#
#  Servicios compartidos entre entornos (QA y Producción):
#    - PostgreSQL 16
#    - Redis 7
#    - RabbitMQ 4 (infra lista, motor pendiente)
#
#  Uso:
#    docker compose up -d                    # Solo infra base
#    docker compose -f docker-compose.yml -f docker-compose.qa.yml up -d    # QA
#    docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d  # Producción
# ═══════════════════════════════════════════════════════════════

services:
  # ─── Base de Datos ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: iaas-postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ron}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ron123}
      POSTGRES_DB: ${POSTGRES_DB:-iaas_ronsys}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ron} -d ${POSTGRES_DB:-iaas_ronsys}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Cache ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: iaas-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ─── Cola de Mensajes ──────────────────────────────────────
  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: iaas-rabbitmq
    ports:
      - "5672:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
